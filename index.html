<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veinid Industrial Dashboard</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }
        
        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-text {
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace;
            font-size: 80px;
            font-weight: bold;
            color: #39FF14;
            position: relative;
            overflow: hidden;
            letter-spacing: 15px;
        }
        
        .loading-text::before {
            content: 'VEIN ID';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #1a1a1a;
            -webkit-text-stroke: 2px #39FF14;
            z-index: 1;
        }
        
        .loading-text::after {
            content: 'VEIN ID';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #39FF14;
            z-index: 2;
            clip-path: inset(0 100% 0 0);
            transition: clip-path 3s ease-in-out;
        }
        
        #loading-screen.start-animate .loading-text::after {
            clip-path: inset(0 0 0 0);
        }
        
        .loading-bar-container {
            width: 300px;
            height: 4px;
            background: #1a1a1a;
            margin-top: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .loading-bar {
            height: 100%;
            background: #39FF14;
            width: 0%;
            transition: width 3s ease-in-out;
            box-shadow: 0 0 20px #39FF14;
        }
        
        #loading-screen.start-animate .loading-bar {
            width: 100%;
        }
        
        .loading-status {
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace;
            font-size: 14px;
            color: #39FF14;
            margin-top: 20px;
            opacity: 0.7;
            letter-spacing: 3px;
        }

        #dashboard-toggle {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: linear-gradient(145deg, #0a0a0a, #1a1a1a);
            border: 2px solid #39FF14;
            color: #39FF14;
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace;
            font-size: 16px;
            padding: 15px 40px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            border-radius: 8px;
            box-shadow: 
                0 0 10px rgba(57, 255, 20, 0.3),
                inset 0 0 20px rgba(57, 255, 20, 0.1);
        }

        #dashboard-toggle.visible {
            opacity: 1;
            pointer-events: all;
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(57, 255, 20, 0.3), inset 0 0 20px rgba(57, 255, 20, 0.1); }
            50% { box-shadow: 0 0 25px rgba(57, 255, 20, 0.6), inset 0 0 30px rgba(57, 255, 20, 0.2); }
        }

        #dashboard-toggle:hover {
            background: linear-gradient(145deg, #39FF14, #2ed610);
            color: #000;
            box-shadow: 
                0 0 30px rgba(57, 255, 20, 0.8),
                inset 0 0 40px rgba(255, 255, 255, 0.3);
            transform: translateX(-50%) translateY(-3px);
        }

        #dashboard-toggle.active {
            background: linear-gradient(145deg, #39FF14, #2ed610);
            color: #000;
            box-shadow: 
                0 0 30px rgba(57, 255, 20, 0.8),
                inset 0 0 40px rgba(255, 255, 255, 0.3);
        }

        #dashboard-toggle:active {
            transform: translateX(-50%) translateY(1px);
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-text">VEIN ID</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-status">INITIALIZING SYSTEM...</div>
    </div>

    <button id="dashboard-toggle">DASHBOARD: ON</button>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/examples/jsm/controls/OrbitControls": "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js",
                "three/examples/jsm/loaders/GLTFLoader": "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
